services:
  - type: web
    name: pm-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: pm-db
    plan: free
    databaseName: pm_database
    user: pm_user
